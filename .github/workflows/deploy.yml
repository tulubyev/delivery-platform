name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_API: ghcr.io/${{ github.repository_owner }}/delivery-api
  IMAGE_WEB: ghcr.io/${{ github.repository_owner }}/delivery-web-builder

jobs:
  # ── Type-check + lint ────────────────────────────────────────────────────
  check:
    name: Type-check & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: { version: 10 }

      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'pnpm' }

      - run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Type-check API
        run: pnpm --filter api exec tsc --noEmit

      - name: Type-check Web
        run: pnpm --filter web exec tsc --noEmit

  # ── Build & push Docker images ───────────────────────────────────────────
  build:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: check
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    outputs:
      api_tag: ${{ steps.meta_api.outputs.tags }}
      web_tag: ${{ steps.meta_web.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Meta API
        id: meta_api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_API }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build & push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta_api.outputs.tags }}
          labels: ${{ steps.meta_api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Meta Web
        id: meta_web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_WEB }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build Web (static files)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          target: builder
          push: true
          tags: ${{ steps.meta_web.outputs.tags }}
          build-args: VITE_API_URL=${{ secrets.VITE_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to VPS ────────────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd /opt/delivery-platform

            # Получить обновления
            git pull origin main

            # Авторизация в GitHub Container Registry
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
              -u ${{ github.actor }} --password-stdin

            # Обновить образы
            docker compose pull api || docker compose build api

            # Скопировать новые статические файлы фронтенда
            docker run --rm \
              -v delivery-platform_web_dist:/mnt \
              ${{ env.IMAGE_WEB }}:latest \
              sh -c "cp -r /app/apps/web/dist/. /mnt/"

            # Перезапустить API без даунтайма
            docker compose up -d --no-deps --wait api

            # Перечитать nginx конфиг
            docker compose exec -T nginx nginx -s reload

            echo "✅ Deploy complete — $(date)"

  # ── EAS Build (mobile) ───────────────────────────────────────────────────
  eas-build:
    name: EAS Build (preview APK)
    runs-on: ubuntu-latest
    needs: check
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install mobile deps
        working-directory: apps/mobile
        run: npm install

      - name: EAS Build (Android preview APK)
        working-directory: apps/mobile
        run: eas build --platform android --profile preview --non-interactive
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.VITE_API_URL }}
