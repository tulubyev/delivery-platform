services:
  # ── API ─────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: delivery-api:latest
    container_name: delivery-api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
    ports:
      - "127.0.0.1:3100:3000"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - internal
    volumes:
      - uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: delivery-redis
    restart: unless-stopped
    command: redis-server --maxmemory 512mb --maxmemory-policy noeviction --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  internal:
    driver: bridge

volumes:
  redis_data:
  uploads:
