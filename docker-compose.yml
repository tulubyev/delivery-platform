version: '3.9'

services:
  # ── API ─────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: delivery-api:latest
    container_name: delivery-api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - internal
    volumes:
      - uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: delivery-redis
    restart: unless-stopped
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Web builder (собирает и кладёт dist в volume) ────────────────────────
  web-builder:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: builder
      args:
        VITE_API_URL: ${VITE_API_URL:-https://api.lastmiles.ru}
    image: delivery-web-builder:latest
    container_name: delivery-web-builder
    volumes:
      - web_dist:/app/apps/web/dist
    entrypoint: ["sh", "-c", "cp -r /app/apps/web/dist/. /mnt/ 2>/dev/null; exit 0"]
    # Используем profiles чтобы запускать только при деплое
    profiles: ["build"]

  # ── nginx + TLS ─────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: delivery-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_webroot:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
      - web_dist:/usr/share/nginx/html:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - internal

  # ── Certbot (Let's Encrypt) ──────────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: delivery-certbot
    volumes:
      - certbot_webroot:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    # Запускается вручную: docker compose run --rm certbot certonly ...
    entrypoint: ["sh", "-c", "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h; done"]
    profiles: ["certbot"]

networks:
  internal:
    driver: bridge

volumes:
  redis_data:
  uploads:
  web_dist:
  certbot_webroot:
  certbot_certs:
