worker_processes auto;
events { worker_connections 2048; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    tcp_nopush    on;
    keepalive_timeout 65;
    client_max_body_size 20M;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               application/x-javascript text/xml application/xml text/javascript
               image/svg+xml font/woff2;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=api_limit:10m  rate=100r/s;

    # TLS session cache
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    upstream api_backend {
        server api:3000;
        keepalive 32;
    }

    # HTTP → HTTPS redirect + ACME challenge
    server {
        listen 80;
        server_name delivery.yourdomain.ru api.delivery.yourdomain.ru;
        location /.well-known/acme-challenge/ { root /var/www/certbot; }
        location / { return 301 https://$host$request_uri; }
    }

    # ── Web frontend ─────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name delivery.yourdomain.ru;

        ssl_certificate     /etc/letsencrypt/live/delivery.yourdomain.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/delivery.yourdomain.ru/privkey.pem;

        # Security headers
        add_header X-Frame-Options        SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
        add_header Referrer-Policy        strict-origin-when-cross-origin;
        add_header Permissions-Policy     "geolocation=(), microphone=()";

        root  /usr/share/nginx/html;
        index index.html;

        # SPA fallback
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Публичная страница трекинга — отдаётся SPA, данные через API
        location /track/ {
            try_files $uri /index.html;
        }

        # Immutable cache для хешированных ассетов Vite
        location ~* \.(js|css|woff2?|ttf|eot|otf)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
        location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
            expires 30d;
            add_header Cache-Control "public";
            access_log off;
        }
    }

    # ── API backend ──────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name api.delivery.yourdomain.ru;

        ssl_certificate     /etc/letsencrypt/live/delivery.yourdomain.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/delivery.yourdomain.ru/privkey.pem;

        add_header X-Content-Type-Options nosniff;

        # Auth endpoints — строгий rate limit
        location /api/auth/login {
            limit_req zone=auth_limit burst=5 nodelay;
            proxy_pass http://api_backend;
            include /etc/nginx/conf.d/proxy_params.conf;
        }
        location /api/auth/refresh {
            limit_req zone=auth_limit burst=10 nodelay;
            proxy_pass http://api_backend;
            include /etc/nginx/conf.d/proxy_params.conf;
        }

        # YooKassa webhook — без лимита (IP Yookassa)
        location /api/payments/webhook {
            proxy_pass http://api_backend;
            include /etc/nginx/conf.d/proxy_params.conf;
        }

        # Все остальные API
        location /api/ {
            limit_req zone=api_limit burst=200 nodelay;
            proxy_pass http://api_backend;
            include /etc/nginx/conf.d/proxy_params.conf;
        }

        # Публичный трекинг
        location /track/ {
            proxy_pass http://api_backend;
            include /etc/nginx/conf.d/proxy_params.conf;
        }

        # WebSocket
        location /ws {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host       $host;
            proxy_set_header X-Real-IP  $remote_addr;
            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;
        }

        location /health {
            proxy_pass http://api_backend;
            include /etc/nginx/conf.d/proxy_params.conf;
            access_log off;
        }
    }
}
