worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 20M;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

    upstream api_backend { server api:3000; keepalive 32; }

    server {
        listen 80;
        server_name yourdomain.ru api.yourdomain.ru;
        location /.well-known/acme-challenge/ { root /var/www/certbot; }
        location / { return 301 https://$host$request_uri; }
    }

    server {
        listen 443 ssl;
        server_name yourdomain.ru;
        ssl_certificate     /etc/letsencrypt/live/yourdomain.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/yourdomain.ru/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        root /usr/share/nginx/html;
        index index.html;
        location / { try_files $uri $uri/ /index.html; }
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ { expires 1y; add_header Cache-Control "public, immutable"; }
    }

    server {
        listen 443 ssl;
        server_name api.yourdomain.ru;
        ssl_certificate     /etc/letsencrypt/live/yourdomain.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/yourdomain.ru/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        location /api/auth/login { limit_req zone=auth_limit burst=5 nodelay; proxy_pass http://api_backend; include /etc/nginx/conf.d/proxy_params.conf; }
        location /api/ { proxy_pass http://api_backend; include /etc/nginx/conf.d/proxy_params.conf; }
        location /ws {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
        }
        location /health { proxy_pass http://api_backend; include /etc/nginx/conf.d/proxy_params.conf; }
    }
}
