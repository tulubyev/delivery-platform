<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Фон: синий скруглённый квадрат -->
  <rect width="32" height="32" rx="7" fill="#2563eb"/>

  <!-- Птица из трёх линий — стремительный стриж в полёте -->
  <!-- Левое крыло — резкий взмах назад-вниз -->
  <path d="M4 13 C8 11 11 15 16 14" stroke="white" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  <!-- Правое крыло — зеркально -->
  <path d="M28 13 C24 11 21 15 16 14" stroke="white" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  <!-- Хвост — раздвоенный, как у ласточки -->
  <path d="M16 14 C15 18 12 21 10 23" stroke="white" stroke-width="1.6" stroke-linecap="round" fill="none"/>
  <path d="M16 14 C17 18 20 21 22 23" stroke="white" stroke-width="1.6" stroke-linecap="round" fill="none"/>
  <!-- Тело — короткий штрих вперёд -->
  <path d="M16 14 C17.5 13 19 12.5 21 12" stroke="white" stroke-width="1.8" stroke-linecap="round" fill="none"/>
</svg>
